openapi: 3.1.0
info:
  title: MunchHelper Backend API
  version: 1.0.0
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  description: |
    OpenAPI specification for MunchHelper backend services:
    - User Management
    - Room Management
    - Character Management
    - Room Notifications (documented as WebSocket upgrade + message schemas)
servers:
  - url: https://api.munch-helper.local
    description: Placeholder production server
security: []
tags:
  - name: User Management
    description: Endpoints for creating and updating user profiles.
  - name: Room Management
    description: Endpoints for creating rooms and managing room types.
  - name: Character Management
    description: Endpoints for creating, updating, and deleting characters.
  - name: Room Notifications
    description: Endpoints for managing room notifications via WebSocket.
paths:
  # User Management
  /users:
    $ref: paths/users.yaml
  /users/{userId}:
    $ref: paths/users_{userId}.yaml
  # Room Management
  /rooms:
    $ref: paths/rooms.yaml
  /rooms/associations:
    $ref: paths/rooms_associations.yaml
  # Room Notifications
  /rooms/{roomId}:
    $ref: paths/rooms_{roomId}.yaml
  # Character Management
  /characters:
    $ref: paths/characters.yaml
  /characters/{characterId}:
    $ref: paths/characters_{characterId}.yaml
