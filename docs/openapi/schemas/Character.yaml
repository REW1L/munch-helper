type: object
required: [id, userId, name, avatar, color, level, power, class, race, gender]
properties:
  id:
    type: string
  userId:
    type: string
  name:
    type: string
  avatar:
    type: integer
  color:
    type: string
    pattern: "^#[0-9A-Fa-f]{6}$"
    description: Hex color code in #RRGGBB format
  level:
    type: integer
  power:
    type: integer
  class:
    type: array
    items:
      type: string
  race:
    type: array
    items:
      type: string
  gender:
    type: array
    items:
      type: string
