type: object
required: [name, avatar, roomId, color]
additionalProperties: false
properties:
  roomId:
    type: string
  userId:
    type: string
  name:
    type: string
  avatar:
    type: integer
  color:
    type: string
    pattern: "^#[0-9A-Fa-f]{6}$"
    description: Hex color code in #RRGGBB format
