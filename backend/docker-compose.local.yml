services:
  nginx:
    image: nginx:1.27-alpine
    container_name: munch-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - room-service
      - character-service
      - room-notifications-service

  user-service:
    build:
      context: ./user-service
    container_name: munch-user-service
    ports:
      - "8082:8082"
    environment:
      USER_SERVICE_PORT: 8082
      USER_MONGO_URI: mongodb://mongo-user:27017/munch_user_service
    depends_on:
      - mongo-user

  room-service:
    build:
      context: ./room-service
    container_name: munch-room-service
    ports:
      - "8083:8083"
    environment:
      ROOM_SERVICE_PORT: 8083
      ROOM_MONGO_URI: mongodb://mongo-room:27017/munch_room_service
      CHARACTER_SERVICE_URL: http://character-service:8084
      CHARACTER_CALL_TIMEOUT_MS: 2000
    depends_on:
      - mongo-room
      - character-service

  character-service:
    build:
      context: ./character-service
    container_name: munch-character-service
    ports:
      - "8084:8084"
    environment:
      CHARACTER_SERVICE_PORT: 8084
      CHARACTER_MONGO_URI: mongodb://mongo-character:27017/munch_character_service
      CHARACTER_EVENTS_REDIS_URL: redis://redis:6379
      ROOM_CHARACTER_EVENTS_CHANNEL: room-character-events
    depends_on:
      - mongo-character
      - redis

  room-notifications-service:
    build:
      context: ./room-notifications-service
    container_name: munch-room-notifications-service
    ports:
      - "8085:8085"
    environment:
      ROOM_NOTIFICATIONS_PORT: 8085
      REDIS_URL: redis://redis:6379
      ROOM_CHARACTER_EVENTS_CHANNEL: room-character-events
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: munch-redis
    ports:
      - "6379:6379"

  mongo-user:
    image: mongo:7
    container_name: munch-mongo-user
    ports:
      - "27021:27017"
    volumes:
      - mongo-user-data:/data/db

  mongo-room:
    image: mongo:7
    container_name: munch-mongo-room
    ports:
      - "27022:27017"
    volumes:
      - mongo-room-data:/data/db

  mongo-character:
    image: mongo:7
    container_name: munch-mongo-character
    ports:
      - "27023:27017"
    volumes:
      - mongo-character-data:/data/db

volumes:
  mongo-user-data:
  mongo-room-data:
  mongo-character-data: