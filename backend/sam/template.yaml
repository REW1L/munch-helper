AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "Munch Helper backend SAM template (phase 2: user, room, character services)"

Parameters:
  UserMongoUri:
    Type: String
    Default: mongodb+srv://sandbox.4ty9upc.mongodb.net/user?authSource=%24external&authMechanism=MONGODB-AWS&appName=Sandbox
    Description: MongoDB connection URI used by user-service Lambda
  RoomMongoUri:
    Type: String
    Default: mongodb+srv://sandbox.4ty9upc.mongodb.net/room?authSource=%24external&authMechanism=MONGODB-AWS&appName=Sandbox
    Description: MongoDB connection URI used by room-service Lambda
  CharacterMongoUri:
    Type: String
    Default: mongodb+srv://sandbox.4ty9upc.mongodb.net/character?authSource=%24external&authMechanism=MONGODB-AWS&appName=Sandbox
    Description: MongoDB connection URI used by character-service Lambda
  RoomNotificationsMongoUri:
    Type: String
    Default: mongodb+srv://sandbox.4ty9upc.mongodb.net/notifications?authSource=%24external&authMechanism=MONGODB-AWS&appName=Sandbox
    Description: MongoDB connection URI used by room-notifications-service Lambda
  CharacterServiceUrl:
    Type: String
    Description: Base URL for character-service called by room-service
  CharacterCallTimeoutMs:
    Type: Number
    Default: "2000"
    Description: Timeout in milliseconds for room-service to call character-service
  RoutePrefix:
    Type: String
    Default: /
    Description: Optional route prefix stripped by Lambda apps before route matching

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    MemorySize: 512
    Timeout: 15
    Tracing: Active
Resources:
  CloudHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: api
      CorsConfiguration:
        AllowOrigins:
          - https://helpamunch.click
        AllowHeaders:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS

  UserServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub user-service-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

  RoomServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub room-service-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

  CharacterServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub character-service-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: PublishRoomCharacterEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RoomCharacterEventsTopic

  RoomNotificationsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub room-notifications-service-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: ManageWebSocketConnections
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudWebSocketApi}/${CloudWebSocketStage}/POST/@connections/*

  RoomCharacterEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-room-character-events

  CloudWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-room-notifications
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  CloudWebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CloudWebSocketApi
      StageName: ws
      AutoDeploy: true

  RoomNotificationsLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CloudWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RoomNotificationsFunction.Arn}/invocations

  RoomNotificationsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CloudWebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${RoomNotificationsLambdaIntegration}

  RoomNotificationsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CloudWebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${RoomNotificationsLambdaIntegration}

  RoomNotificationsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CloudWebSocketApi
      RouteKey: $default
      Target: !Sub integrations/${RoomNotificationsLambdaIntegration}

  UserServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-user-service
      CodeUri: ../user-service
      Handler: lambda.handler
      Role: !GetAtt UserServiceRole.Arn
      Environment:
        Variables:
          USER_MONGO_URI: !Ref UserMongoUri
          ROUTE_PREFIX: !Ref RoutePrefix
      Events:
        UserHealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /health
            Method: GET
        UserCreatePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /users
            Method: POST
        UserReadGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /users/{userId}
            Method: GET
        UserUpdatePatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /users/{userId}
            Method: PATCH
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        Minify: true
        Target: es2022
        Sourcemap: false
        Format: cjs

  RoomServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-room-service
      CodeUri: ../room-service
      Handler: lambda.handler
      Role: !GetAtt RoomServiceRole.Arn
      Environment:
        Variables:
          ROOM_MONGO_URI: !Ref RoomMongoUri
          CHARACTER_SERVICE_URL: !Ref CharacterServiceUrl
          CHARACTER_CALL_TIMEOUT_MS: !Ref CharacterCallTimeoutMs
          ROUTE_PREFIX: !Ref RoutePrefix
      Events:
        RoomCreatePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /rooms
            Method: POST
        RoomAssociationCreatePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /rooms/associations
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        Minify: true
        Target: es2022
        Sourcemap: false
        Format: cjs

  CharacterServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-character-service
      CodeUri: ../character-service
      Handler: lambda.handler
      Role: !GetAtt CharacterServiceRole.Arn
      Environment:
        Variables:
          CHARACTER_MONGO_URI: !Ref CharacterMongoUri
          ROOM_CHARACTER_EVENTS_TOPIC_ARN: !Ref RoomCharacterEventsTopic
          ROUTE_PREFIX: !Ref RoutePrefix
      Events:
        CharacterListGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /characters
            Method: GET
        CharacterCreatePost:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /characters
            Method: POST
        CharacterUpdatePatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /characters/{characterId}
            Method: PATCH
        CharacterDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudHttpApi
            Path: /characters/{characterId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        Minify: true
        Target: es2022
        Sourcemap: false
        Format: cjs

  RoomNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-room-notifications-service
      CodeUri: ../room-notifications-service
      Handler: lambda.handler
      Role: !GetAtt RoomNotificationsRole.Arn
      Environment:
        Variables:
          ROOM_NOTIFICATIONS_MONGO_URI: !Ref RoomNotificationsMongoUri
          ROOM_NOTIFICATIONS_WS_ENDPOINT: !Sub https://${CloudWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${CloudWebSocketStage}
      Events:
        RoomCharacterEvent:
          Type: SNS
          Properties:
            Topic: !Ref RoomCharacterEventsTopic
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        Minify: true
        Target: es2022
        Sourcemap: false
        Format: cjs

  RoomNotificationsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RoomNotificationsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudWebSocketApi}/*/*

Outputs:
  ApiBaseUrl:
    Description: HTTP API endpoint for this stack
    Value: !Sub https://${CloudHttpApi}.execute-api.${AWS::Region}.amazonaws.com/api
  WebSocketApiUrl:
    Description: WebSocket API endpoint for room notifications
    Value: !Sub wss://${CloudWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${CloudWebSocketStage}
  RoomCharacterEventsTopicArn:
    Description: SNS topic used to fan out room character lifecycle notifications
    Value: !Ref RoomCharacterEventsTopic
