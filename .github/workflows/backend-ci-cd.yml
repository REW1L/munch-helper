name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"

permissions:
  contents: read

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            has_tests: true
          - service: room-service
            has_tests: true
          - service: character-service
            has_tests: true
          - service: room-notifications-service
            has_tests: true

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker Image
        run: docker build -t munch-helper/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Typecheck Service
        run: npm run typecheck -w ${{ matrix.service }}

      - name: Test Service
        if: ${{ matrix.has_tests }}
        run: npx vitest run "${{ matrix.service }}" --config vitest.config.ts

      - name: Skip Tests (No Test Suite)
        if: ${{ !matrix.has_tests }}
        run: echo "No tests configured for ${{ matrix.service }}"

  coverage_gate:
    name: Coverage Gate (Backend)
    runs-on: ubuntu-latest
    needs: build_and_test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Enforce Coverage Thresholds
        run: npm run test:coverage

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: coverage_gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: backend

    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEPLOY_ROLE_NAME: ${{ vars.AWS_DEPLOY_ROLE_NAME }}
      API_PREFIX: ${{ vars.API_PREFIX }}
      CHARACTER_SERVICE_URL: ${{ vars.CHARACTER_SERVICE_URL }}
      USER_MONGO_URI: ${{ secrets.USER_MONGO_URI }}
      ROOM_MONGO_URI: ${{ secrets.ROOM_MONGO_URI }}
      CHARACTER_MONGO_URI: ${{ secrets.CHARACTER_MONGO_URI }}
      ROOM_NOTIFICATIONS_MONGO_URI: ${{ secrets.ROOM_NOTIFICATIONS_MONGO_URI }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate Required Inputs
        run: |
          set -euo pipefail
          for key in AWS_ACCOUNT_ID AWS_REGION AWS_DEPLOY_ROLE_NAME API_PREFIX CHARACTER_SERVICE_URL USER_MONGO_URI ROOM_MONGO_URI CHARACTER_MONGO_URI ROOM_NOTIFICATIONS_MONGO_URI; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required variable or secret: $key" >&2
              exit 1
            fi
          done

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_DEPLOY_ROLE_NAME }}
          role-session-name: gha-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        run: npm ci

      - name: Build SAM
        run: npm run sam:build

      - name: Deploy SAM Stack
        run: |
          sam deploy \
            --config-file sam/samconfig.toml \
            --region "$AWS_REGION" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              UserMongoUri="$USER_MONGO_URI" \
              RoomMongoUri="$ROOM_MONGO_URI" \
              CharacterMongoUri="$CHARACTER_MONGO_URI" \
              CharacterServiceUrl="$CHARACTER_SERVICE_URL" \
              RoutePrefix="$API_PREFIX" \
              RoomNotificationsMongoUri="$ROOM_NOTIFICATIONS_MONGO_URI"
