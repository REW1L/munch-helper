name: Frontend Build and Infrastructure Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/frontend-infra-cd.yml"
      - "backend/sam/template.yaml"
      - "!frontend/android/**"
      - "!frontend/ios/**"
  pull_request:
    paths:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/frontend-infra-cd.yml"
      - "backend/sam/template.yaml"

permissions:
  contents: read

concurrency:
  group: frontend-infra-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_frontend:
    name: Build Frontend Web Artifacts
    runs-on: ubuntu-latest
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      API_BASE_URL: ${{ vars.API_BASE_URL || secrets.API_BASE_URL }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Required Inputs
        run: |
          set -euo pipefail
          for key in AWS_ACCOUNT_ID AWS_REGION API_BASE_URL; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required variable or secret: $key" >&2
              exit 1
            fi
          done

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Typecheck Frontend
        run: npm run tsc

      - name: Run Frontend Tests
        run: npm run test:coverage

      - name: Build Frontend
        run: EXPO_PUBLIC_API_URL="$API_BASE_URL" npm run export:web --clear

      - name: Upload Frontend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  deploy_infrastructure:
    name: Deploy Frontend Infrastructure
    runs-on: ubuntu-latest
    needs: build_frontend
    environment: Frontend
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      AWS_DEPLOY_ROLE_NAME: ${{ vars.AWS_DEPLOY_ROLE_NAME }}
      PULUMI_CLOUD_URL: ${{ secrets.PULUMI_CLOUD_URL }}
      PULUMI_STACK_NAME: ${{ vars.PULUMI_STACK_NAME }}

    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_DEPLOY_ROLE_NAME }}
          role-session-name: gha-frontend-infra-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Infrastructure
        uses: pulumi/actions@v4
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK_NAME }}
          cloud-url: ${{ secrets.PULUMI_CLOUD_URL }}
          work-dir: infrastructure
